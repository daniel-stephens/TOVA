# Nginx configuration for TOVA Flask application
# Place this file in /etc/nginx/sites-available/tova
# Then create a symlink: sudo ln -s /etc/nginx/sites-available/tova /etc/nginx/sites-enabled/
# Test config: sudo nginx -t
# Reload: sudo systemctl reload nginx

# Upstream Gunicorn server
upstream tova_app {
    # Connect via localhost even if Gunicorn binds to 0.0.0.0
    # This is more secure when Nginx is in front
    server 127.0.0.1:8000 fail_timeout=0;
    # For multiple workers, you can add more servers:
    # server 127.0.0.1:8001 fail_timeout=0;
    # server 127.0.0.1:8002 fail_timeout=0;
}

# Redirect HTTP to HTTPS (uncomment if using SSL)
# server {
#     listen 80;
#     server_name your-domain.com www.your-domain.com;
#     return 301 https://$server_name$request_uri;
# }

# Main server block
server {
    listen 80;
    # For HTTPS, uncomment and configure:
    # listen 443 ssl http2;
    # ssl_certificate /path/to/your/certificate.crt;
    # ssl_certificate_key /path/to/your/private.key;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    
    server_name _;  # Replace with your domain name, e.g., your-domain.com
    
    # Maximum upload size (adjust as needed)
    client_max_body_size 100M;
    
    # Timeouts
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;
    
    # Logging
    access_log /var/log/nginx/tova_access.log;
    error_log /var/log/nginx/tova_error.log;
    
    # Static files - adjust paths to match your project structure
    location /static {
        alias /Users/danielstephens/Desktop/TOVA/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Proxy all other requests to Gunicorn
    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Don't buffer responses
        proxy_buffering off;
        
        # Pass to upstream
        proxy_pass http://tova_app;
        
        # Redirects
        proxy_redirect off;
    }
    
    # Health check endpoint (optional)
    location /health {
        access_log off;
        proxy_pass http://tova_app;
    }
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

